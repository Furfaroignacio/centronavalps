<!-- ====== NAVEGADOR ENTRE PLACAS — pegar IGUAL en los 3 archivos ======
     Requisito: que los 3 .html estén en la misma carpeta con estos nombres.
     Si los renombrás, cambiá los data-file de abajo. -->
<nav id="cnNav">
  <a data-file="index.html">Portada / Formación</a>
  <a data-file="juveniles-historia.html">Juveniles</a>
  <a data-file="mvp-historia.html">MVP</a>
</nav>
<style>
  #cnNav{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:99999;display:flex;gap:4px;
    background:rgba(18,24,31,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px;
    box-shadow:0 10px 34px rgba(0,0,0,.5);font-family:Poppins,system-ui,sans-serif}
  #cnNav a{padding:9px 18px;border-radius:999px;color:#aebcc8;font-size:13px;font-weight:600;
    text-decoration:none;letter-spacing:.2px;white-space:nowrap;cursor:pointer;transition:background .15s,color .15s}
  #cnNav a:hover{color:#fff}
  #cnNav a.active{background:#5fb4d6;color:#06222e}
  @media(max-width:620px){#cnNav{gap:2px;padding:4px;bottom:12px}#cnNav a{padding:8px 13px;font-size:12px}}
</style>
<script>
(function(){
  var here=(location.pathname.split('/').pop()||'').toLowerCase();
  document.querySelectorAll('#cnNav a').forEach(function(a){
    a.href=a.getAttribute('data-file');
    if(here===a.getAttribute('data-file').toLowerCase()) a.classList.add('active');
  });
})();
</script>
<!-- ====== FIN NAVEGADOR ====== -->
